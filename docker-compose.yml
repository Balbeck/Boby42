services:
  backend:
    build: ./backend
    container_name: boby42-backend
    network_mode: host
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    environment:
      # Ollama n'écoute que sur 127.0.0.1 sur l'hôte (config partagée 42AI, on n'y touche pas).
      # En network_mode: host, le container partage la stack réseau de l'hôte,
      # donc localhost dans le container = localhost sur l'hôte = Ollama joignable.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
      # Forcé ici plutôt que de dépendre du chargement de backend/.env (non committé,
      # peut être absent/désynchronisé sur l'hôte) : sans ça fastify-cli retombe
      # sur son port par défaut 3000 au lieu de 8420.
      PORT: ${PORT:-8420}
  frontend:
    build: ./frontend
    container_name: boby42-frontend
    ports:
      - "8421:8421"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
volumes:
  backend_node_modules:
  frontend_node_modules:
